<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LK Tech Job Market Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">

    <header class="bg-gray-800 border-b border-gray-700 py-6 px-8 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-teal-400">📊 LK Tech Job Market Tracker</h1>
                <p class="text-sm text-gray-400 mt-1">Real-time Cloud-Native IT Job Insights in Sri Lanka</p>
            </div>
            <span class="bg-teal-500/10 text-teal-400 border border-teal-500/30 text-xs px-3 py-1 rounded-full font-medium">
                Live Backend API Connected
            </span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-sm">
                <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Total Scraped Jobs</p>
                <p id="total-jobs-count" class="text-4xl font-extrabold text-white mt-2">Loading...</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-sm">
                <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Primary Tech Hub</p>
                <p class="text-4xl font-extrabold text-teal-400 mt-2">Colombo, LK</p>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-sm mb-8">
            <h2 class="text-lg font-bold text-white mb-4">📈 Top In-Demand Skills Analytics</h2>
            <div class="relative h-[300px]">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-700">
                <h2 class="text-lg font-bold text-white">💼 Latest IT Job Openings</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-700">
                    <thead class="bg-gray-700/50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Job Title</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Company</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Location</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Required Skills</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Salary Estimate</th>
                        </tr>
                    </thead>
                    <tbody id="jobs-table-body" class="divide-y divide-gray-700 bg-gray-800">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 1. නිවැරදි Azure Backend URL එක (https:// සමඟ)
        const API_URL = "https://lk-tech-api-nethmi-hfh9e4dwbrg2fvd3.southeastasia-01.azurewebsites.net";

        async function fetchDashboardData() {
            try {
                // 1. Fetching Analytics for the Graph
                const analyticsRes = await fetch(`${API_URL}/analytics`);
                const analyticsData = await analyticsRes.json();
                renderChart(analyticsData.analytics);

                // 2. Fetching Total Jobs List
                const jobsRes = await fetch(`${API_URL}/jobs`);
                const jobsData = await jobsRes.json();
                
                // Update Total Jobs Count Card
                document.getElementById('total-jobs-count').innerText = jobsData.total_jobs;
                
                // Update Table Content
                const tableBody = document.getElementById('jobs-table-body');
                tableBody.innerHTML = ""; // Clear existing loading state

                jobsData.jobs.forEach(job => {
                    const row = `
                        <tr class="hover:bg-gray-700/30 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-white">${job.title}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-300">${job.company}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-400">${job.location}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                ${job.skills.map(skill => `<span class="bg-teal-500/10 text-teal-400 border border-teal-500/20 text-xs px-2 py-0.5 rounded-md mr-1">${skill}</span>`).join('')}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-teal-400">${job.salary_range}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('total-jobs-count').innerText = "Error Loading API";
            }
        }

        // Chart.js මඟින් ප්‍රස්ථාරය ඇඳීමේ function එක
        function renderChart(analytics) {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            const labels = Object.keys(analytics);
            const dataValues = Object.values(analytics);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Number of Job Postings',
                        data: dataValues,
                        backgroundColor: '#2dd4bf', // Teal color
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#374151' },
                            ticks: { color: '#9ca3af' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#9ca3af' }
                        }
                    }
                }
            });
        }

        // පිටුව load වන විටම data ටික fetch කරන්න
        window.onload = fetchDashboardData;
</script>
</body>
</html>
